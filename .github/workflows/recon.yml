name: NASA XSS Scanner

on:
  workflow_dispatch: # Jalankan manual setelah endpoint discovery selesai

jobs:
  xss-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'

      - name: Install XSS Tools
        run: |
          # Gxss untuk cek refleksi parameter
          go install github.com/KathanP19/Gxss@latest
          
          # Dalfox sebagai main XSS Scanner
          go install github.com/hahwul/dalfox/v2@latest
          
          sudo mv ~/go/bin/* /usr/bin/

      - name: Run XSS Scanning
        env:
          TARGET: "nasa.gov"
        run: |
          mkdir -p results/$TARGET/vulnerabilities
          INPUT_FILE="results/$TARGET/endpoints/xss_parameters.txt"
          OUTPUT_FILE="results/$TARGET/vulnerabilities/xss_results.txt"

          if [ ! -f "$INPUT_FILE" ]; then 
            echo "[!] File $INPUT_FILE tidak ditemukan!"; exit 1; 
          fi

          echo "[*] Tahap 1: Memeriksa refleksi parameter (Gxss)..."
          # Gxss akan memfilter URL yang benar-benar memantulkan input kita
          cat $INPUT_FILE | Gxss -p khynz | grep "Reflected" | awk '{print $1}' > reflected_targets.txt

          echo "[*] Tahap 2: Scanning dengan Dalfox..."
          if [ -s reflected_targets.txt ]; then
            # Scan hanya URL yang reflected agar lebih cepat dan efektif
            dalfox file reflected_targets.txt \
              --worker 20 \
              --timeout 10 \
              --header "User-Agent: NASA-VDP-Scanner-Research" \
              --output $OUTPUT_FILE
          else
            echo "[!] Tidak ada parameter yang reflected. Mencoba scan langsung (light mode)..."
            # Jika Gxss kosong, scan 50 URL pertama secara acak dari list asli sebagai sample
            head -n 50 $INPUT_FILE | dalfox pipe --worker 10 --output $OUTPUT_FILE
          fi

      - name: Save Results to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add results/
          git commit -m "XSS Scan Update - $(date +'%Y-%m-%d')" || exit 0
          git push origin master || git push origin main
