name: NASA Advanced Recon 2026

on:
  schedule:
    - cron: '0 0 * * *' # Jalan otomatis setiap jam 12 malam
  workflow_dispatch:   # Tombol manual "Run Workflow"

jobs:
  recon-nasa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'

      - name: Install Hunting Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          go install github.com/tomnomnom/anew@latest
          sudo mv ~/go/bin/* /usr/bin/

      - name: Start Scanning NASA
        env:
          TARGET: "nasa.gov"
        run: |
          mkdir -p results/$TARGET
          TODAY=$(date +%Y-%m-%d)

          # Cari subdomain & filter yang aktif saja
          subfinder -d $TARGET -silent | dnsx -silent | anew results/$TARGET/resolved.txt

          # Cek web server & teknologi (Rate limit 100 biar aman)
          cat results/$TARGET/resolved.txt | httpx -silent -td -title -status-code -rl 100 -o results/$TARGET/live_web.txt

          # Scan kerentanan otomatis
          cat results/$TARGET/live_web.txt | awk '{print $1}' | nuclei -as -silent -rl 50 -o results/$TARGET/vulnerabilities_$TODAY.txt

      - name: Save Results to Repo
        env:
          # Menggunakan token internal GitHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # [BAGIAN PENTING]: Kasih tahu identitas bot ke Git
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Simpan perubahan
          git add results/
          
          # Commit hanya jika ada file baru agar tidak error
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "NASA Recon Report - $(date +'%Y-%m-%d %H:%M')"
            git push origin master || git push origin main
          else
            echo "Gak ada data baru, gak perlu push."
          fi
