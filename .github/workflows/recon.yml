name: NASA XSS Scanner Final

on:
  workflow_dispatch: # Jalankan manual setelah file xss_parameters.txt tersedia

jobs:
  xss-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'

      - name: Install XSS Tools
        run: |
          # Gxss untuk cek refleksi parameter
          go install github.com/KathanP19/Gxss@latest
          
          # Dalfox versi terbaru
          go install github.com/hahwul/dalfox/v2@latest
          
          sudo mv ~/go/bin/* /usr/bin/

      - name: Run XSS Scanning
        env:
          TARGET: "nasa.gov"
        run: |
          mkdir -p results/$TARGET/vulnerabilities
          INPUT_FILE="results/$TARGET/endpoints/xss_parameters.txt"
          OUTPUT_FILE="results/$TARGET/vulnerabilities/xss_results.txt"

          if [ ! -f "$INPUT_FILE" ]; then 
            echo "[!] File $INPUT_FILE tidak ditemukan!"; exit 1; 
          fi

          echo "[*] Tahap 1: Memeriksa refleksi parameter (Gxss)..."
          # Menambahkan timeout agar tidak nyangkut (Broken pipe)
          cat $INPUT_FILE | Gxss -p khynz -c 50 | grep "Reflected" | awk '{print $1}' > reflected_targets.txt

          echo "[*] Tahap 2: Scanning dengan Dalfox (Safe Mode)..."
          if [ -s reflected_targets.txt ]; then
            # Menggunakan mode stabil untuk menghindari crash
            dalfox file reflected_targets.txt \
              --worker 5 \
              --delay 100 \
              --no-browser \
              --skip-bailing \
              --timeout 15 \
              --header "User-Agent: NASA-VDP-Scanner-Research" \
              --output $OUTPUT_FILE
          else
            echo "[!] Tidak ada parameter yang reflected via Gxss."
            echo "[*] Melakukan sampling 30 URL teratas secara langsung..."
            head -n 30 $INPUT_FILE | dalfox pipe \
              --worker 5 \
              --no-browser \
              --skip-bailing \
              --output $OUTPUT_FILE
          fi

      - name: Save Results to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git add results/
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "XSS Scan Final Results - $(date +'%Y-%m-%d')" || exit 0
            git push origin master || git push origin main
          else
            echo "Tidak ada temuan XSS yang tersimpan."
          fi
