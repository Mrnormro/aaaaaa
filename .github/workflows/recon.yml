name: NASA Ultimate Recon 2026 (Persistent Data)

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:   

jobs:
  recon-nasa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'

      - name: Install Hunting Tools
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install github.com/tomnomnom/anew@latest
          sudo mv ~/go/bin/* /usr/bin/

      - name: Execution - Scan from Existing Resolved List
        env:
          TARGET: "nasa.gov"
        run: |
          mkdir -p results/$TARGET
          TODAY=$(date +%Y-%m-%d)
          RESOLVED_FILE="results/$TARGET/resolved.txt"

          # Cek apakah file resolved.txt ada
          if [ -f "$RESOLVED_FILE" ]; then
            echo "[+] Menggunakan file $RESOLVED_FILE yang sudah ada."
            
            echo "[*] Tahap 1: Validasi URL Aktif (Proses Pembersihan)..."
            cat $RESOLVED_FILE | httpx -silent | anew results/$TARGET/live_web_clean.txt

            echo "[*] Tahap 2: Scanning Vulnerabilities (Low to Critical)..."
            cat results/$TARGET/live_web_clean.txt | nuclei \
              -as \
              -silent \
              -severity low,medium,high,critical \
              -retries 2 \
              -timeout 10 \
              -rl 50 \
              -o results/$TARGET/vulnerabilities_$TODAY.txt
          else
            echo "[!] File $RESOLVED_FILE tidak ditemukan. Pastikan sudah ada hasil scan sebelumnya."
            exit 1
          fi

      - name: Save Results to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git add results/
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "NASA Scan Update (Persistent) - $TODAY"
            git push origin master || git push origin main
          else
            echo "Tidak ada temuan baru."
          fi
