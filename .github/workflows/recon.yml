name: NASA Direct XSS Scanner

on:
  workflow_dispatch:

jobs:
  xss-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'

      - name: Install Dalfox
        run: |
          go install github.com/hahwul/dalfox/v2@latest
          sudo mv ~/go/bin/dalfox /usr/bin/

      - name: Run Dalfox Directly
        env:
          TARGET: "nasa.gov"
        run: |
          mkdir -p results/$TARGET/vulnerabilities
          INPUT_FILE="results/$TARGET/endpoints/xss_parameters.txt"
          OUTPUT_FILE="results/$TARGET/vulnerabilities/xss_results.txt"

          if [ ! -f "$INPUT_FILE" ]; then 
            echo "[!] File $INPUT_FILE tidak ditemukan!"; exit 1; 
          fi

          echo "[*] Memulai Direct Scanning pada seluruh list..."
          # Menggunakan worker 10 agar cepat tapi tidak terlalu berisik
          # --no-browser untuk mencegah crash 'panic'
          # --skip-bailing agar scan terus lanjut meski ada satu target yang timeout
          cat $INPUT_FILE | dalfox pipe \
            --worker 10 \
            --no-browser \
            --skip-bailing \
            --timeout 15 \
            --header "User-Agent: NASA-VDP-Researcher" \
            --output $OUTPUT_FILE

      - name: Save Results to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add results/
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Direct XSS Scan Results - $(date +'%Y-%m-%d')" || exit 0
            git push origin master || git push origin main
          else
            echo "Tidak ada temuan baru."
          fi
